<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minkikar Family Invitation</title>
    
    <meta property="og:title" content="Minkikar Family Griha Pravesh Invitation">
    <meta property="og:description" content="Tap to see the video invite and location directions.">
    <meta property="og:image" content="https://minkikar.github.io/invitation/house.jpeg"> 
    <meta property="og:url" content="https://minkikar.github.io/invitation/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root {
            --marigold: #FF8C00;
            --deep-red: #8B0000;
        }

        body, html {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #fffaf0; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
            position: fixed; 
        }

        .view-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100dvh;
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 
            text-align: center;
            box-sizing: border-box;
            padding: 20px 15px 30px 15px;
            background-color: #fffaf0;
        }

        /* 1. Splash Screen */
        #gate { z-index: 100; background: radial-gradient(circle, #fff, #ffe0b2); display: flex; justify-content: center; }
        .gate-btn {
            padding: 20px 40px; font-size: 1.2rem; border: none;
            background: var(--marigold); color: white; border-radius: 50px;
            cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 2. Video Layer */
        #video-layer { z-index: 50; background: black; padding: 0; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 3. Invitation Page */
        #invite-page { z-index: 10; }
        
        .header-text { flex-shrink: 0; margin-bottom: 5px; }

        .invite-card {
            flex-grow: 1;
            flex-shrink: 1;
            max-height: 50vh; 
            max-width: 95%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            object-fit: contain;
            margin: 10px 0;
        }

        /* 4. Map Page */
        #map-page { z-index: 20; }

        .action-btn {
            flex-shrink: 0;
            width: 85%; max-width: 300px; min-height: 55px;
            text-decoration: none; border: none; border-radius: 50px;
            font-weight: bold; color: white;
            background: linear-gradient(45deg, var(--marigold), #D4AF37);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer;
        }

        .back-btn {
            background: none; border: 1px solid var(--deep-red);
            color: var(--deep-red); padding: 8px 20px; border-radius: 20px;
            margin-bottom: 10px; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
    </style>
</head>
<body>

    <div id="gate" class="view-container">
        <h1 style="color: var(--deep-red); margin-bottom: 10px;">Minkikar Family</h1>
        <button class="gate-btn" onclick="startExperience()">📩 Open Invitation</button>
    </div>

    <div id="video-layer" class="view-container">
        <video id="inviteVideo" playsinline>
            <source src="your-parents-video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="invite-page" class="view-container fade-in">
        <div class="header-text">
            <h2 style="color: var(--deep-red); margin: 5px 0; font-size: 1.3rem;">Vastu Shanti & Griha Pravesh</h2>
            <div style="font-size: 0.85rem; color: #333; line-height: 1.4;">
                <strong>Vinayak Nagar, Near DYSP Office,</strong><br>
                Dharmabad, Tq. Dharmabad, Dist. Nanded.
            </div>
        </div>

        <img src="invitation-card.jpeg" class="invite-card">

        <button onclick="showMapPage()" class="action-btn">
            📍 View Location on Map
        </button>
    </div>

    <div id="map-page" class="view-container fade-in">
        <div style="width: 100%;">
            <button class="back-btn" onclick="showInvitePage()">← Back to Invite</button>
            <h3 style="color: var(--deep-red); margin: 0 0 10px 0;">Our Location</h3>
        </div>
        
        <div style="width: 100%; height: 50vh; border-radius: 12px; overflow: hidden; border: 2px solid var(--marigold);">
            <iframe 
    width="100%" 
    height="100%" 
    frameborder="0" 
    src="https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=18.893587,77.856122" 
    sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
    allowfullscreen>
</iframe>
        </div>

        <a href="https://www.google.com/maps/dir/?api=1&destination=18.893587,77.856122&travelmode=driving" 
   class="action-btn" 
   target="_blank">
    🚀 Open Google Maps App
</a>
    </div>

    <script>
        const gate = document.getElementById('gate');
        const videoLayer = document.getElementById('video-layer');
        const inviteVideo = document.getElementById('inviteVideo');
        const invitePage = document.getElementById('invite-page');
        const mapPage = document.getElementById('map-page');

        function startExperience() {
            gate.style.display = 'none';
            videoLayer.style.display = 'flex';
            inviteVideo.muted = false;
            inviteVideo.play().catch(e => {
                // Fallback if autoplay is blocked
                console.log("Autoplay blocked, showing invite");
                showInvitePage();
            });
        }

        inviteVideo.onended = function() {
            videoLayer.style.display = 'none';
            invitePage.style.display = 'flex';
        };

        function showMapPage() {
            // Force hidden first to reset state
            invitePage.style.display = 'none';
            setTimeout(() => {
                mapPage.style.display = 'flex';
            }, 10);
        }

        function showInvitePage() {
            mapPage.style.display = 'none';
            setTimeout(() => {
                invitePage.style.display = 'flex';
            }, 10);
        }
    </script>
</body>
</html>
