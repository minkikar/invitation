<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minkikar Family Invitation</title>
    
    <meta property="og:title" content="Minkikar Family Griha Pravesh Invitation">
    <meta property="og:description" content="Tap to see the video invite and location directions.">
    <meta property="og:image" content="https://minkikar.github.io/invitation/house.jpeg"> 
    <meta property="og:url" content="https://minkikar.github.io/invitation/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        :root {
            --marigold: #FF8C00;
            --deep-red: #8B0000;
        }

        body, html {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #fffaf0; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Prevents scrolling anywhere */
        }

        /* Common Container for all Views */
        .view-container {
            position: fixed; inset: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; box-sizing: border-box;
            padding: 15px; background-color: #fffaf0;
        }

        /* 1. Splash Screen */
        #gate { z-index: 100; background: radial-gradient(circle, #fff, #ffe0b2); }
        .gate-btn {
            padding: 20px 40px; font-size: 1.2rem; border: none;
            background: var(--marigold); color: white; border-radius: 50px;
            cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 2. Video Layer */
        #video-layer { z-index: 50; background: black; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 3. Invitation Page */
        #invite-page { z-index: 10; display: none; justify-content: space-between; }
        
        .invite-card {
            max-height: 50vh; /* Scaled to ensure text and button fit in 1 frame */
            max-width: 95%; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            object-fit: contain;
        }

        /* 4. Map Page */
        #map-page { z-index: 20; display: none; }

        .action-btn {
            width: 85%; max-width: 300px; padding: 15px;
            text-decoration: none; border: none; border-radius: 50px;
            font-weight: bold; color: white;
            background: linear-gradient(45deg, var(--marigold), #D4AF37);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer;
        }

        .back-btn {
            background: none; border: 1px solid var(--deep-red);
            color: var(--deep-red); padding: 8px 20px; border-radius: 20px;
            margin-bottom: 15px; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.8s ease-in forwards; }
    </style>
</head>
<body>

    <div id="gate" class="view-container">
        <h1 style="color: var(--deep-red); margin-bottom: 10px;">Minkikar Family</h1>
        <button class="gate-btn" onclick="startExperience()">📩 Open Invitation</button>
    </div>

    <div id="video-layer" class="view-container">
        <video id="inviteVideo" playsinline>
            <source src="your-parents-video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="invite-page" class="view-container fade-in">
        <h2 style="color: var(--deep-red); margin: 0;">Vastu Shanti & Griha Pravesh</h2>
        
        <div style="font-size: 0.9rem; color: #333; line-height: 1.4;">
            <strong>Vinayak Nagar, Near DYSP Office,</strong><br>
            Dharmabad, Tq. Dharmabad, Dist. Nanded.
        </div>

        <img src="invitation-card.jpeg" class="invite-card">

        <button onclick="showMapPage()" class="action-btn">
            📍 View Location on Map
        </button>
    </div>

    <div id="map-page" class="view-container fade-in">
        <button class="back-btn" onclick="showInvitePage()">← Back to Invite</button>
        
        <h3 style="color: var(--deep-red); margin: 0 0 10px 0;">Our Location</h3>
        
        <div style="width: 100%; height: 55vh; border-radius: 12px; overflow: hidden; border: 2px solid var(--marigold);">
            <iframe 
                width="100%" height="100%" frameborder="0" 
                src="https://maps.google.com/maps?q=18.893587,77.856122&z=15&output=embed">
            </iframe>
        </div>

        <a href="https://www.google.com/maps/dir/?api=1&destination=18.893587,77.856122" class="action-btn" style="margin-top: 15px;">
            🚀 Open in Maps App
        </a>
    </div>

    <script>
        const gate = document.getElementById('gate');
        const videoLayer = document.getElementById('video-layer');
        const inviteVideo = document.getElementById('inviteVideo');
        const invitePage = document.getElementById('invite-page');
        const mapPage = document.getElementById('map-page');

        function startExperience() {
            gate.style.display = 'none';
            videoLayer.style.display = 'block';
            inviteVideo.muted = false;
            inviteVideo.play();
        }

        // When video ends, swap to the Invitation Page
        inviteVideo.onended = function() {
            videoLayer.style.display = 'none';
            invitePage.style.display = 'flex';
            
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        };

        function showMapPage() {
            invitePage.style.display = 'none';
            mapPage.style.display = 'flex';
        }

        function showInvitePage() {
            mapPage.style.display = 'none';
            invitePage.style.display = 'flex';
        }
    </script>

</body>
</html>
