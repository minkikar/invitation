<!DOCTYPE html>
<html lang="te">
<head>
    <meta property="og:title" content="Minkikar Family Griha Pravesh Invitation">
    <meta property="og:description" content="Tap to see the video invite and get location directions.">
    <meta property="og:image" content="/house.jpeg"> <meta property="og:url" content="https://yourdomain.com">
    <meta name="twitter:card" content="summary_large_image">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minkikar Family Invitation</title>
    <style>
        :root {
            --marigold: #FF8C00;
            --deep-red: #8B0000;
        }
        /* Lock the screen height to prevent scrolling */
        body, html {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #fffaf0; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
        }

        /* 1. Splash Screen */
        #gate {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle, #fff, #ffe0b2);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .gate-btn {
            padding: 20px 40px; font-size: 1.2rem; border: none;
            background: var(--marigold); color: white; border-radius: 50px;
            cursor: pointer; font-weight: bold;
        }

        /* 2. Fullscreen Video Layer */
        #video-layer {
            position: fixed; inset: 0; z-index: 50;
            background: black; display: none;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 3. Final Invitation Frame (Single Screen) */
        #invite-page {
            display: none; 
            height: 100vh; /* Exactly one screen high */
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly; /* Even spacing between elements */
            align-items: center;
            box-sizing: border-box;
            padding: 10px;
            animation: fadeIn 1s ease-in-out forwards;
        }
        
        #invite-page h2 {
            margin: 0; color: var(--deep-red); font-size: 1.2rem;
        }

        /* Responsive Card - fits within the available space */
        .invite-card {
            max-width: 90%;
            max-height: 70vh; /* Keeps card small enough for button below */
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            object-fit: contain;
        }

        .action-btn {
            width: 85%; max-width: 300px; padding: 15px;
            text-decoration: none; border-radius: 50px;
            font-weight: bold; color: white;
            background: linear-gradient(45deg, var(--marigold), #D4AF37);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="gate">
        <h1 style="color: var(--deep-red); margin-bottom: 10px;">Minkikar Family</h1>
        <button class="gate-btn" onclick="startExperience()">📩 Open Invitation</button>
    </div>

    <div id="video-layer">
        <video id="inviteVideo" playsinline>
            <source src="your-parents-video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="invite-page" style="display: none;">
        <h2>Griha Pravesh Invitation</h2>
        
        <img src="invitation-card.jpeg" class="invite-card">
        
        <a href="https://www.google.com/maps/dir/?api=1&destination=18.893587,77.856122" class="action-btn" target="_blank">
            📍 Address
        </a>
    </div>

    <script>
        const gate = document.getElementById('gate');
        const videoLayer = document.getElementById('video-layer');
        const inviteVideo = document.getElementById('inviteVideo');
        const invitePage = document.getElementById('invite-page');

        function startExperience() {
            gate.style.display = 'none';
            videoLayer.style.display = 'block';
            inviteVideo.muted = false;
            inviteVideo.play();
        }

        // Switch to single-frame invite when video ends
        inviteVideo.onended = function() {
            videoLayer.style.display = 'none';
            invitePage.style.cssText = "display: flex !important;"; // Use flex to center elements
            
            // Exit fullscreen if active
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        };
    </script>

</body>
</html>
